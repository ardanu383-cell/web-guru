<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Berita - GuruOnline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css">
    <style>
        /* Styling konten HTML dari Summernote */
        .berita-konten h1 { font-size: 1.8rem; font-weight: 700; margin: 1rem 0; }
        .berita-konten h2 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0; }
        .berita-konten h3 { font-size: 1.2rem; font-weight: 600; margin: 0.8rem 0; }
        .berita-konten p  { margin: 0.6rem 0; line-height: 1.8; }
        .berita-konten ul { list-style-type: disc !important; padding-left: 2rem; margin: 0.6rem 0; }
        .berita-konten ol { list-style-type: decimal !important; padding-left: 2rem; margin: 0.6rem 0; }
        .berita-konten li { display: list-item !important; margin: 0.3rem 0; }
        .berita-konten li:empty { display: none !important; }
        .berita-konten a  { color: #4f46e5; text-decoration: underline; }
        .berita-konten img { max-width: 100%; border-radius: 0.5rem; margin: 1rem 0; }
        .berita-konten table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .berita-konten th, .berita-konten td { border: 1px solid #e5e7eb; padding: 0.5rem 0.75rem; }
        .berita-konten th { background: #f9fafb; font-weight: 600; }
        .berita-konten blockquote { border-left: 4px solid #4f46e5; padding-left: 1rem; color: #6b7280; margin: 1rem 0; }
        .berita-konten strong { font-weight: 700; }
        .berita-konten em { font-style: italic; }
        .berita-konten u  { text-decoration: underline; }
        .berita-konten s  { text-decoration: line-through; }
        .berita-konten hr { border: none; border-top: 1px solid #e5e7eb; margin: 1.5rem 0; }
    </style>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-lg fixed w-full z-50" id="navbar"></nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8 pt-24">
        <div id="beritaContent" class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <!-- Loading skeleton -->
            <div class="animate-pulse p-8">
                <div class="h-8 bg-gray-200 rounded w-3/4 mb-4"></div>
                <div class="h-4 bg-gray-200 rounded w-1/2 mb-8"></div>
                <div class="h-64 bg-gray-200 rounded mb-4"></div>
                <div class="h-4 bg-gray-200 rounded mb-2"></div>
                <div class="h-4 bg-gray-200 rounded w-5/6"></div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const beritaId = urlParams.get('id');

        async function loadBerita() {
            try {
                const res = await fetch(`/api/berita/${beritaId}`);
                const b = await res.json();

                const kategoriColors = {
                    umum: 'bg-gray-100 text-gray-700',
                    akademik: 'bg-blue-100 text-blue-700',
                    kegiatan: 'bg-yellow-100 text-yellow-700',
                    pengumuman: 'bg-red-100 text-red-700'
                };
                const badgeClass = kategoriColors[b.kategori] || 'bg-green-100 text-green-700';

                document.title = `${b.judul} - GuruOnline`;

                document.getElementById('beritaContent').innerHTML = `
                    ${b.thumbnail_url
                        ? `<img src="${b.thumbnail_url}" class="w-full max-h-80 object-cover">`
                        : ''}
                    <div class="p-6 md:p-10">
                        <div class="flex items-center space-x-3 mb-4">
                            <span class="px-3 py-1 rounded-full text-sm font-medium ${badgeClass}">${b.kategori}</span>
                            <span class="text-gray-400 text-sm">${new Date(b.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
                        </div>
                        <h1 class="text-3xl font-bold text-gray-900 mb-3">${b.judul}</h1>
                        <p class="text-gray-500 text-sm mb-8">Ditulis oleh <strong>${b.guru_nama}</strong></p>
                        <hr class="mb-8">
                        <div class="berita-konten text-gray-700">
                            ${b.isi}
                        </div>
                    </div>
                `;
            } catch (e) {
                document.getElementById('beritaContent').innerHTML = '<div class="p-8 text-red-600">Gagal memuat berita.</div>';
            }
        }

        loadBerita();
    </script>
</body>
</html>
