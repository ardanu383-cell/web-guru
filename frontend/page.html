<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman - GuruOnline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css">
    <style>
        .page-konten h1 { font-size:1.8rem; font-weight:700; margin:1rem 0; }
        .page-konten h2 { font-size:1.5rem; font-weight:700; margin:1rem 0; }
        .page-konten h3 { font-size:1.2rem; font-weight:600; margin:0.8rem 0; }
        .page-konten p  { margin:0.6rem 0; line-height:1.8; }
        .page-konten ul { list-style:disc; padding-left:1.5rem; margin:0.6rem 0; }
        .page-konten ol { list-style:decimal; padding-left:1.5rem; margin:0.6rem 0; }
        .page-konten li { margin:0.3rem 0; }
        .page-konten a  { color:#4f46e5; text-decoration:underline; }
        .page-konten img { max-width:100%; border-radius:0.5rem; margin:1rem 0; }
        .page-konten table { width:100%; border-collapse:collapse; margin:1rem 0; }
        .page-konten th, .page-konten td { border:1px solid #e5e7eb; padding:0.5rem 0.75rem; }
        .page-konten th { background:#f9fafb; font-weight:600; }
        .page-konten blockquote { border-left:4px solid #4f46e5; padding-left:1rem; color:#6b7280; margin:1rem 0; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navbar dinamis -->
    <nav class="bg-white shadow-lg fixed w-full z-50" id="navbar"></nav>

    <main class="pt-20 min-h-screen">
        <!-- Loading -->
        <div id="loadingState" class="max-w-4xl mx-auto px-4 py-16 text-center">
            <div class="animate-pulse">
                <div class="h-8 bg-gray-200 rounded w-1/2 mx-auto mb-4"></div>
                <div class="h-4 bg-gray-200 rounded mb-2"></div>
                <div class="h-4 bg-gray-200 rounded w-5/6 mb-2"></div>
            </div>
        </div>

        <!-- Konten halaman -->
        <div id="pageContent" class="hidden">
            <!-- Hero halaman -->
            <div class="bg-gradient-to-br from-indigo-600 to-purple-700 py-16 px-4">
                <div class="max-w-4xl mx-auto">
                    <a href="index.html" class="text-indigo-200 hover:text-white text-sm mb-4 inline-block">← Kembali ke Beranda</a>
                    <h1 id="pageJudul" class="text-3xl md:text-4xl font-bold text-white"></h1>
                </div>
            </div>
            <!-- Isi konten -->
            <div class="max-w-4xl mx-auto px-4 py-10">
                <div id="pageKonten" class="bg-white rounded-2xl shadow-lg p-8 page-konten text-gray-700"></div>
            </div>
        </div>

        <div id="notFound" class="hidden max-w-4xl mx-auto px-4 py-16 text-center">
            <div class="text-6xl mb-4">😕</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Halaman tidak ditemukan</h2>
            <a href="index.html" class="text-indigo-600 hover:underline">Kembali ke Beranda</a>
        </div>
    </main>

    <footer class="bg-white border-t py-8 px-4 mt-8">
        <div class="max-w-7xl mx-auto text-center text-gray-500 text-sm">
            <p>© GuruOnline. Platform Pembelajaran Digital.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        async function loadPage() {
            if (!slug) { showNotFound(); return; }
            try {
                const res = await fetch(`/api/menu/pages/${slug}`);
                if (!res.ok) { showNotFound(); return; }
                const page = await res.json();
                document.title = `${page.judul} - GuruOnline`;
                document.getElementById('pageJudul').textContent = page.judul;
                document.getElementById('pageKonten').innerHTML = page.konten;
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('pageContent').classList.remove('hidden');
            } catch(e) { showNotFound(); }
        }

        function showNotFound() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('notFound').classList.remove('hidden');
        }

        loadPage();
    </script>
</body>
</html>
