<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis - GuruOnline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-md px-4 py-3">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <a href="dashboard-siswa.html" class="text-indigo-600 font-semibold hover:underline">← Kembali</a>
            <span id="timer" class="font-mono font-bold text-red-600"></span>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:p-8">
        <div id="kuisContainer" class="bg-white rounded-2xl shadow-lg p-6 md:p-10">
            <div class="animate-pulse">
                <div class="h-6 bg-gray-200 rounded w-1/2 mb-4"></div>
                <div class="h-4 bg-gray-200 rounded w-3/4"></div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        checkAuth();
        const urlParams = new URLSearchParams(window.location.search);
        const kuisId = urlParams.get('id');
        let soalData = [];
        let jawaban = {};
        let waktuSisa;
        let timerInterval;

        async function loadKuis() {
            try {
                const kuis = await api.get(`/kuis/${kuisId}`);
                soalData = kuis.soal;
                waktuSisa = kuis.waktu_menit * 60;
                
                document.getElementById('kuisContainer').innerHTML = `
                    <h1 class="text-2xl font-bold text-gray-900 mb-2">${kuis.judul}</h1>
                    <p class="text-gray-600 mb-8">${kuis.deskripsi || ''}</p>
                    
                    <form id="kuisForm" class="space-y-8">
                        ${kuis.soal.map((s, idx) => `
                            <div class="border rounded-xl p-6">
                                <div class="font-semibold text-gray-900 mb-4">
                                    <span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-sm mr-2">Soal ${idx + 1}</span>
                                    ${s.pertanyaan}
                                </div>
                                <div class="space-y-3">
                                    ${['A','B','C','D'].map(pilihan => `
                                        <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition">
                                            <input type="radio" name="soal_${s.id}" value="${pilihan}" class="w-4 h-4 text-indigo-600" onchange="jawaban[${s.id}] = '${pilihan}'">
                                            <span class="ml-3 text-gray-700">${s['pilihan_' + pilihan.toLowerCase()]}</span>
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                        
                        <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition shadow-lg">
                            Selesai & Kirim Jawaban
                        </button>
                    </form>
                `;

                startTimer();
                
                document.getElementById('kuisForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    clearInterval(timerInterval);
                    
                    if (Object.keys(jawaban).length < soalData.length) {
                        if (!confirm('Beberapa soal belum dijawab. Yakin ingin mengirim?')) return;
                    }

                    try {
                        const result = await api.post(`/kuis/${kuisId}/submit`, { jawaban });
                        document.getElementById('kuisContainer').innerHTML = `
                            <div class="text-center py-10">
                                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <h2 class="text-2xl font-bold text-gray-900 mb-2">Kuis Selesai!</h2>
                                <p class="text-gray-600 mb-6">Terima kasih telah mengerjakan kuis ini.</p>
                                <div class="bg-indigo-50 rounded-xl p-6 inline-block">
                                    <div class="text-sm text-gray-600 mb-1">Nilai Anda</div>
                                    <div class="text-5xl font-bold text-indigo-600">${result.nilai}</div>
                                    <div class="text-sm text-gray-600 mt-2">${result.benar} benar dari ${result.total} soal</div>
                                </div>
                                <div class="mt-8">
                                    <a href="dashboard-siswa.html" class="text-indigo-600 font-semibold hover:underline">Kembali ke Dashboard</a>
                                </div>
                            </div>
                        `;
                    } catch (e) { alert('Gagal mengirim jawaban'); }
                });
            } catch (e) {
                document.getElementById('kuisContainer').innerHTML = '<div class="text-red-600">Gagal memuat kuis.</div>';
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                waktuSisa--;
                const menit = Math.floor(waktuSisa / 60);
                const detik = waktuSisa % 60;
                document.getElementById('timer').textContent = `${menit}:${detik.toString().padStart(2, '0')}`;
                
                if (waktuSisa <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('kuisForm').dispatchEvent(new Event('submit'));
                }
            }, 1000);
        }

        loadKuis();
    </script>
</body>
</html>
