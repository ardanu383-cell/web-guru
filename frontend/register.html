<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - GuruOnline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Buat Akun Baru</h1>
            <p class="text-gray-500 mt-2">Bergabunglah dengan komunitas belajar kami</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Nama Lengkap</label>
                <input type="text" id="nama" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Nama Anda">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="nama@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" id="password" required minlength="6" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Minimal 6 karakter">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Daftar Sebagai</label>
                <select id="role" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="siswa">Siswa</option>
                    <option value="guru">Guru</option>
                </select>
            </div>
            <div id="kelasField">
                <label class="block text-sm font-medium text-gray-700 mb-2">Kelas</label>
                <input type="text" id="kelas" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Contoh: X IPA 1">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition shadow-lg">
                Daftar
            </button>
        </form>

        <p class="text-center mt-6 text-gray-600">
            Sudah punya akun? <a href="login.html" class="text-indigo-600 font-semibold hover:underline">Login di sini</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('role').addEventListener('change', (e) => {
            document.getElementById('kelasField').style.display = e.target.value === 'siswa' ? 'block' : 'none';
        });

        // Set default dari URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('role')) {
            document.getElementById('role').value = urlParams.get('role');
            document.getElementById('role').dispatchEvent(new Event('change'));
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await api.post('/auth/register', {
                    nama: document.getElementById('nama').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    role: document.getElementById('role').value,
                    kelas: document.getElementById('kelas').value
                });
                
                alert('Registrasi berhasil! Silakan login.');
                window.location.href = 'login.html';
            } catch (error) {
                alert(error.message);
            }
        });
    </script>
</body>
</html>
