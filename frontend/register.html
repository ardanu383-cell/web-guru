<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Siswa - GuruOnline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-white font-bold text-2xl">G</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Daftar sebagai Siswa</h1>
            <p class="text-gray-500 mt-2">Buat akun untuk mulai belajar</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Nama Lengkap</label>
                <input type="text" id="nama" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none"
                    placeholder="Nama lengkap Anda">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none"
                    placeholder="nama@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" id="password" required minlength="6"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none"
                    placeholder="Minimal 6 karakter">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Kelas</label>
                <input type="text" id="kelas"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none"
                    placeholder="Contoh: X IPA 1">
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition shadow-lg">
                Daftar Sekarang
            </button>
        </form>

        <!-- Info pending -->
        <div class="mt-4 p-3 bg-yellow-50 border border-yellow-200 rounded-lg text-sm text-yellow-800 hidden" id="infoBox">
            <strong>⏳ Menunggu Persetujuan</strong><br>
            Akun Anda telah dibuat dan sedang menunggu persetujuan dari admin. Anda akan bisa login setelah disetujui.
        </div>

        <div class="mt-6 space-y-2 text-center text-sm text-gray-500">
            <p>Sudah punya akun? <a href="login.html" class="text-indigo-600 font-semibold hover:underline">Login di sini</a></p>
            <p>Anda seorang guru? <a href="register-guru.html" class="text-purple-600 font-semibold hover:underline">Daftar sebagai Guru</a></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true;
            btn.textContent = 'Mendaftar...';
            try {
                const res = await api.post('/auth/register', {
                    nama: document.getElementById('nama').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    role: 'siswa',
                    kelas: document.getElementById('kelas').value
                });
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('infoBox').classList.remove('hidden');
            } catch (error) {
                alert(error.message);
                btn.disabled = false;
                btn.textContent = 'Daftar Sekarang';
            }
        });
    </script>
</body>
</html>
