<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Guru - GuruOnline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Daftar sebagai Guru</h1>
            <p class="text-gray-500 mt-2">Halaman ini hanya untuk guru yang memiliki kode undangan</p>
        </div>

        <!-- Step 1: Verifikasi kode -->
        <div id="step1">
            <div class="p-4 bg-purple-50 border border-purple-200 rounded-lg mb-6 text-sm text-purple-800">
                🔐 Pendaftaran guru memerlukan <strong>kode undangan</strong> dari admin. Hubungi admin untuk mendapatkan kode.
            </div>
            <form id="verifyForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Kode Undangan</label>
                    <input type="password" id="inviteCode" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 outline-none text-center text-lg tracking-widest"
                        placeholder="Masukkan kode undangan">
                </div>
                <button type="submit" class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition">
                    Verifikasi Kode
                </button>
            </form>
        </div>

        <!-- Step 2: Form pendaftaran (muncul setelah kode valid) -->
        <div id="step2" class="hidden">
            <div class="p-3 bg-green-50 border border-green-200 rounded-lg mb-6 text-sm text-green-800">
                ✅ Kode valid! Lengkapi data pendaftaran Anda.
            </div>
            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Nama Lengkap</label>
                    <input type="text" id="nama" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 outline-none"
                        placeholder="Nama lengkap Anda">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 outline-none"
                        placeholder="nama@email.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" required minlength="6"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 outline-none"
                        placeholder="Minimal 6 karakter">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Konfirmasi Password</label>
                    <input type="password" id="confirmPassword" required minlength="6"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 outline-none"
                        placeholder="Ulangi password">
                </div>
                <button type="submit" class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition shadow-lg">
                    Daftar sebagai Guru
                </button>
            </form>
        </div>

        <p class="text-center mt-6 text-sm text-gray-500">
            Sudah punya akun? <a href="login.html" class="text-purple-600 font-semibold hover:underline">Login di sini</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script>
        let verifiedCode = '';

        // Step 1: Verifikasi kode ke backend
        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('inviteCode').value;
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Memverifikasi...';

            try {
                // Test kode dengan dummy request
                await api.post('/auth/verify-invite', { invite_code: code });
                verifiedCode = code;
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            } catch (err) {
                alert(err.message || 'Kode undangan tidak valid.');
                btn.disabled = false;
                btn.textContent = 'Verifikasi Kode';
            }
        });

        // Step 2: Daftar guru
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (password !== confirm) {
                alert('Password dan konfirmasi password tidak sama.');
                return;
            }
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Mendaftar...';
            try {
                await api.post('/auth/register', {
                    nama: document.getElementById('nama').value,
                    email: document.getElementById('email').value,
                    password,
                    role: 'guru',
                    invite_code: verifiedCode
                });
                alert('Pendaftaran berhasil! Silakan login.');
                window.location.href = 'login.html';
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.textContent = 'Daftar sebagai Guru';
            }
        });
    </script>
</body>
</html>
