<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Materi - GuruOnline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-md px-4 py-3">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="dashboard-siswa.html" class="text-indigo-600 font-semibold hover:underline">← Kembali</a>
            <span class="font-bold text-gray-800">GuruOnline</span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8">
        <div id="materiContent" class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="animate-pulse p-8">
                <div class="h-8 bg-gray-200 rounded w-3/4 mb-4"></div>
                <div class="h-4 bg-gray-200 rounded w-1/2"></div>
            </div>
        </div>

        <!-- Komentar -->
        <div class="mt-8 bg-white rounded-2xl shadow-lg p-6">
            <h3 class="text-lg font-bold mb-4">Diskusi</h3>
            <form id="komentarForm" class="mb-6">
                <textarea id="isiKomentar" required rows="3" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Tulis komentar atau pertanyaan..."></textarea>
                <button type="submit" class="mt-2 bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">Kirim</button>
            </form>
            <div id="komentarList" class="space-y-4"></div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        checkAuth();
        const urlParams = new URLSearchParams(window.location.search);
        const materiId = urlParams.get('id');

        async function loadMateri() {
            try {
                const m = await api.get(`/materi/${materiId}`);
                
                let fileContent = '';
                if (m.file_url) {
                    if (m.tipe === 'video') {
                        fileContent = `<video controls class="w-full rounded-lg mb-6"><source src="http://localhost:5000${m.file_url}" type="video/mp4"></video>`;
                    } else if (m.tipe === 'dokumen') {
                        fileContent = `<a href="http://localhost:5000${m.file_url}" target="_blank" class="inline-block bg-indigo-100 text-indigo-700 px-4 py-2 rounded-lg mb-6">📄 Download Dokumen</a>`;
                    }
                }

                document.getElementById('materiContent').innerHTML = `
                    <div class="p-6 md:p-10">
                        <div class="flex items-center space-x-3 mb-4">
                            <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-sm font-medium">${m.mapel}</span>
                            <span class="text-gray-500 text-sm">Kelas ${m.kelas_target}</span>
                        </div>
                        <h1 class="text-3xl font-bold text-gray-900 mb-4">${m.judul}</h1>
                        <p class="text-gray-600 mb-2">Oleh: <strong>${m.guru_nama}</strong></p>
                        <p class="text-gray-500 text-sm mb-8">${new Date(m.created_at).toLocaleDateString('id-ID')}</p>
                        
                        ${fileContent}
                        
                        <div class="prose max-w-none text-gray-700 leading-relaxed">
                            <p class="font-medium mb-4">${m.deskripsi}</p>
                            <div class="bg-gray-50 p-6 rounded-xl">
                                ${m.konten ? m.konten.replace(/\n/g, '<br>') : 'Tidak ada konten tambahan.'}
                            </div>
                        </div>
                    </div>
                `;

                // Load komentar
                const komentarHtml = m.komentar?.map(k => `
                    <div class="border-b pb-4">
                        <div class="flex items-center mb-2">
                            <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-bold text-sm mr-3">${k.siswa_nama[0]}</div>
                            <div>
                                <div class="font-semibold text-sm">${k.siswa_nama}</div>
                                <div class="text-xs text-gray-500">${new Date(k.created_at).toLocaleDateString('id-ID')}</div>
                            </div>
                        </div>
                        <p class="text-gray-700 text-sm">${k.isi}</p>
                    </div>
                `).join('') || '<p class="text-gray-500 text-sm">Belum ada komentar.</p>';
                
                document.getElementById('komentarList').innerHTML = komentarHtml;
            } catch (e) {
                document.getElementById('materiContent').innerHTML = '<div class="p-8 text-red-600">Gagal memuat materi.</div>';
            }
        }

        document.getElementById('komentarForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await api.post(`/materi/${materiId}/komentar`, {
                    isi: document.getElementById('isiKomentar').value
                });
                document.getElementById('isiKomentar').value = '';
                loadMateri();
            } catch (e) { alert('Gagal mengirim komentar'); }
        });

        loadMateri();
    </script>
</body>
</html>
