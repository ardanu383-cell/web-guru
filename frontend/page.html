<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman - GuruOnline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css">
    <style>
        /* Override Tailwind preflight untuk konten halaman */
        .page-konten h1 { font-size:1.8rem; font-weight:700; margin:1.2rem 0 0.6rem; line-height:1.3; }
        .page-konten h2 { font-size:1.5rem; font-weight:700; margin:1.2rem 0 0.5rem; line-height:1.3; }
        .page-konten h3 { font-size:1.25rem; font-weight:600; margin:1rem 0 0.4rem; }
        .page-konten h4 { font-size:1.1rem; font-weight:600; margin:0.8rem 0 0.3rem; }
        .page-konten p  { margin:0.6rem 0; line-height:1.8; word-wrap:break-word; overflow-wrap:break-word; white-space:normal; }

        /* List — paksa tampil dengan nomor/bullet */
        .page-konten ul,
        .page-konten ol { padding-left:2rem; margin:0.8rem 0; overflow:hidden; }
        .page-konten ul { list-style-type: disc !important; }
        .page-konten ol { list-style-type: decimal !important; }
        .page-konten ul ul { list-style-type: circle !important; }
        .page-konten ul ul ul { list-style-type: square !important; }
        .page-konten ol ol { list-style-type: lower-alpha !important; }
        .page-konten li { display: list-item !important; margin:0.3rem 0; line-height:1.7; overflow:visible; }
        /* Sembunyikan li kosong */
        .page-konten li:empty { display: none !important; }
        .page-konten li > br:only-child { display: none; }

        .page-konten a  { color:#4f46e5; text-decoration:underline; }
        .page-konten img { border-radius:0.5rem; margin:0.5rem; }
        /* Gambar tanpa float — full width */
        .page-konten img:not([style*="float"]) { max-width:100%; }
        /* Float gambar dari summernote */
        .page-konten img[style*="float: left"],
        .page-konten img[style*="float:left"] { float:left !important; margin:0 1.5rem 0.5rem 0 !important; }
        .page-konten img[style*="float: right"],
        .page-konten img[style*="float:right"] { float:right !important; margin:0 0 0.5rem 1.5rem !important; }
        /* Div yang HANYA berisi gambar — float berdasarkan align */
        .page-konten div:has(> img:only-child) { margin-bottom: 0.5rem; line-height: 0; }
        .page-konten div[style*="text-align: left"]:has(> img:only-child),
        .page-konten div[style*="text-align:left"]:has(> img:only-child) {
            float: left; margin: 0 1.5rem 0.5rem 0; width: auto; max-width: 45%;
        }
        .page-konten div[style*="text-align: right"]:has(> img:only-child),
        .page-konten div[style*="text-align:right"]:has(> img:only-child) {
            float: right; margin: 0 0 0.5rem 1.5rem; width: auto; max-width: 45%;
        }
        /* Gambar di dalam div float — ikuti lebar parent */
        .page-konten div:has(> img:only-child) img { max-width: 100% !important; width: 100% !important; height: auto; }
        /* Div yang berisi TEKS — pastikan normal dan tidak overflow */
        .page-konten div:not(:has(> img:only-child)) {
            line-height: 1.8;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
            min-width: 0;
        }
        /* Clearfix */
        .page-konten { overflow: auto; }
        .page-konten::after { content: ''; display: table; clear: both; }
        .page-konten table { width:100%; border-collapse:collapse; margin:1rem 0; }
        .page-konten th, .page-konten td { border:1px solid #e5e7eb; padding:0.5rem 0.75rem; text-align:left; }
        .page-konten th { background:#f9fafb; font-weight:600; }
        .page-konten blockquote { border-left:4px solid #4f46e5; padding-left:1rem; color:#6b7280; margin:1rem 0; font-style:italic; }
        .page-konten pre { background:#f3f4f6; padding:1rem; border-radius:0.5rem; overflow-x:auto; font-family:monospace; }
        .page-konten strong { font-weight:700; }
        .page-konten em { font-style:italic; }
        .page-konten u  { text-decoration:underline; }
        .page-konten s  { text-decoration:line-through; }
        .page-konten hr { border:none; border-top:1px solid #e5e7eb; margin:1.5rem 0; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navbar dinamis -->
    <nav class="bg-white shadow-lg fixed w-full z-50" id="navbar"></nav>

    <main class="pt-20 min-h-screen">
        <!-- Loading -->
        <div id="loadingState" class="max-w-4xl mx-auto px-4 py-16 text-center">
            <div class="animate-pulse">
                <div class="h-8 bg-gray-200 rounded w-1/2 mx-auto mb-4"></div>
                <div class="h-4 bg-gray-200 rounded mb-2"></div>
                <div class="h-4 bg-gray-200 rounded w-5/6 mb-2"></div>
            </div>
        </div>

        <!-- Konten halaman -->
        <div id="pageContent" class="hidden">
            <!-- Hero halaman -->
            <div class="bg-gradient-to-br from-indigo-600 to-purple-700 py-16 px-4">
                <div class="max-w-4xl mx-auto">
                    <a href="index.html" class="text-indigo-200 hover:text-white text-sm mb-4 inline-block">← Kembali ke Beranda</a>
                    <h1 id="pageJudul" class="text-3xl md:text-4xl font-bold text-white"></h1>
                </div>
            </div>
            <!-- Isi konten -->
            <div class="max-w-4xl mx-auto px-4 py-10">
                <div id="pageKonten" class="bg-white rounded-2xl shadow-lg p-8 page-konten text-gray-700"></div>
            </div>
        </div>

        <div id="notFound" class="hidden max-w-4xl mx-auto px-4 py-16 text-center">
            <div class="text-6xl mb-4">😕</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Halaman tidak ditemukan</h2>
            <a href="index.html" class="text-indigo-600 hover:underline">Kembali ke Beranda</a>
        </div>
    </main>

    <footer class="bg-white border-t py-8 px-4 mt-8">
        <div class="max-w-7xl mx-auto text-center text-gray-500 text-sm">
            <p>© GuruOnline. Platform Pembelajaran Digital.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        async function loadPage() {
            if (!slug) { showNotFound(); return; }
            try {
                const res = await fetch(`/api/menu/pages/${slug}`);
                if (!res.ok) { showNotFound(); return; }
                const page = await res.json();
                document.title = `${page.judul} - GuruOnline`;
                document.getElementById('pageJudul').textContent = page.judul;
                // Proses konten
                let konten = page.konten;
                // Hapus br kosong di dalam div
                konten = konten.replace(/<div([^>]*)>\s*<br\s*\/?>\s*<\/div>/gi, '');
                // Fix gambar dengan width% — batasi max 45% untuk float
                konten = konten.replace(
                    /(<img[^>]*style="[^"]*width:\s*)(\d+)(%[^"]*")/gi,
                    (match, pre, num, post) => {
                        const w = parseInt(num);
                        // Jika gambar terlalu besar (>50%), biarkan full width
                        if (w > 50) return `${pre}100${post}`;
                        return match;
                    }
                );
                document.getElementById('pageKonten').innerHTML = konten + '<div style="clear:both"></div>';
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('pageContent').classList.remove('hidden');
            } catch(e) { showNotFound(); }
        }

        function showNotFound() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('notFound').classList.remove('hidden');
        }

        loadPage();
    </script>
</body>
</html>
